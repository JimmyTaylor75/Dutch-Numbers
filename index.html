<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dutch Number Flash Card Exercises</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">Goedemorgen</button>
    <div class="flag-strip">
      <span class="red"></span>
      <span class="white"></span>
      <span class="blue"></span>
    </div>
    <h1>Dutch Number Flash Card Exercises</h1>
    <p class="subtitle">Leer de Nederlandse getallen &mdash; Learn Dutch Numbers</p>
  </header>

  <main>
    <div class="card">
      <p class="prompt">Please select your mode to begin</p>
      <div class="mode-buttons">
        <button class="btn-mode" onclick="location.href='practice.html'">Practice Mode</button>
        <button class="btn-mode orange" onclick="location.href='game.html'">Game Mode</button>
      </div>
    </div>
  </main>

  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
      }
    })();

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-btn').textContent = isDark ? 'Goedeavond' : 'Goedemorgen';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('theme-btn').textContent = 'Goedeavond';
      }
    });
  </script>
</body>
</html>
