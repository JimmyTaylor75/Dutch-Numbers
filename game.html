<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Mode &mdash; Dutch Number Flash Card Exercises</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header>
    <button class="btn-theme" id="theme-btn" onclick="toggleTheme()">Goedemorgen</button>
    <div class="flag-strip">
      <span class="red"></span>
      <span class="white"></span>
      <span class="blue"></span>
    </div>
    <h1>Game Mode</h1>
    <p class="subtitle">Dutch Number Flash Card Exercises</p>
  </header>

  <main>
    <div class="card coming-soon">
      <div class="icon">&#127918;</div>
      <h2>Coming Soon!</h2>
      <p>Game Mode is under construction. Check back soon for a fun timed challenge!</p>
    </div>
  </main>

  <!-- Fixed back button -->
  <div class="back-btn-wrap">
    <a href="index.html" class="btn-back">Back to the Beginning</a>
  </div>

  <script>
    (function () {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
      }
    })();

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('theme-btn').textContent = isDark ? 'Goedeavond' : 'Goedemorgen';
    }

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('theme-btn').textContent = 'Goedeavond';
      }
    });
  </script>
</body>
</html>
